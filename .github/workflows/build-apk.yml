name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'web/android/**'
      - 'web/capacitor.config.ts'
      - 'web/package.json'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Prepare Android assets directory
        run: mkdir -p web/android/app/src/main/assets

      - name: Sync Capacitor (copies config + plugins into android/)
        working-directory: web
        run: npx cap sync android

      - name: Make gradlew executable
        working-directory: web/android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: web/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: B100-Emergencias-${{ github.run_number }}.apk
          path: web/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
