# Fly.io config para el worker de scraping de B100
app = "b100-scraper"
primary_region = "gru"  # São Paulo, Brazil — más cercano a Lima

[build]

[env]
  POLL_INTERVAL_MS = "3000"
  NODE_ENV = "production"

[processes]
  worker = "node src/index.js"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

# No HTTP service — this is a background worker
# Secrets to set via CLI (never commit these):
# fly secrets set APP_URL=<your-vercel-url>
# fly secrets set SCRAPER_SECRET=<your-secret>
